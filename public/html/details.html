<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="../style.css" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Details | Library</title>
  </head>
  <body>
    <div class="container">
      <nav class="nav nav--other">
        <a class="nav__link-logo" href="/">
          <img
            class="nav__logo"
            src="/img/logo-black.png"
            alt="Logo of The Story Haven"
          />
        </a>

        <div class="nav__links">
          <a href="/home#books" class="nav__link">Books</a>
          <a href="/home#authors" class="nav__link">Authors</a>
          <button class="nav__search-btn">
            <ion-icon name="search"></ion-icon>
          </button>
        </div>

        <!-- Search Modal -->
        <div id="searchModal" class="modal">
          <div class="modal-content modal-search">
            <h2>Search Books</h2>

            <form action="/search" method="GET" class="search-form">
              <input
                type="text"
                name="query"
                placeholder="Search for a book..."
                class="search-input"
                required
              />

              <button type="submit" class="search-submit">
                <ion-icon name="search"></ion-icon>
              </button>
            </form>

            <button id="closeSearchModal" class="modal-close">
              Cancel
            </button>
          </div>
        </div>
      </nav>

      <section class="details">
        <div class="details__sidebar">
          <img class="details__img" />
          <div class="details__btns">
            <a class="details__btn details__btn--edit">
              <ion-icon name="create-outline"></ion-icon>
              <p>Edit</p>
            </a>
            <button class="details__btn details__btn--delete">
              <ion-icon name="trash-outline"></ion-icon>
              <p>Delete</p>
            </button>
          </div>

          <div id="deleteModal" class="modal">
            <div class="modal__content">
              <h3>Are you sure you want to delete this book?</h3>

              <div class="modal__actions">
                <button
                  id="cancelDelete"
                  class="modal__btn modal__btn--cancel"
                >
                  Cancel
                </button>

                <form id="deleteForm">
                  <button
                    type="submit"
                    class="modal__btn modal__btn--delete"
                  >
                    Delete
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="details__main">
          <h1 class="details__title">
            <!-- TITLE -->
          </h1>
          <p class="details__author">
            <!-- AUTHOR -->
          </p>

          <p class="details__summary">
            <!-- SUMMARY -->
          </p>
          <div class="details__genres">
            <p>
              <!-- Genres -->
            </p>

            <div class="details__tags">
              <p class="details__tag details__tag--1">
                <!-- TAG1 -->
              </p>
              <p class="details__tag details__tag--2">
                <!-- TAG2 -->
              </p>
            </div>
          </div>
          <p class="details__publisher">
            <!-- First published in YEARPUBLISHED by PUBLISHER -->
          </p>
          <p class="details__language">
            <!-- Language: LANGUAGE -->
          </p>
          <p class="details__status">
            Status:
            <span class="details__status--available">
              <!-- Available -->
            </span>
          </p>
          <div class="details__loan-dates">Loans</div>
          <table class="details__loan-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Borrowed On</th>
                <th>Return By</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>December 12, 2025</td>
                <td>December 26, 2025</td>
              </tr>
              <tr>
                <td>2</td>
                <td>December 19, 2025</td>
                <td>January 2, 2025</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer class="footer">
        <div class="footer__links">
          <a href="/home#books" class="footer__link">Books</a>
          <a href="/home#authors" class="footer__link">Authors</a>
          <a href="/" class="footer__link">Search</a>
        </div>
        <div class="footer__socials">
          <a href="https://www.instagram.com/">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
          <a href="https://x.com/">
            <ion-icon name="logo-twitter"></ion-icon>
          </a>
          <a href="https://www.linkedin.com/">
            <ion-icon name="logo-linkedin"></ion-icon>
          </a>
        </div>
        <p class="footer__copyright">
          &copy; 2025 The Story Haven Ltd.
        </p>
      </footer>
    </div>

    <!-- ICONS -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const pathParts = window.location.pathname.split('/');
        const bookId = pathParts[pathParts.length - 1];

        if (!bookId) return alert('No book ID provided.');

        try {
          const res = await fetch(`/api/v1/books/${bookId}`);
          const data = await res.json();

          if (!res.ok)
            throw new Error(data.message || 'Failed to fetch book');

          const book = data.data.book;

          document.querySelector(
            '.details__img'
          ).src = `/img/book-covers/${book.imageCover}`;
          document.querySelector('.details__title').textContent =
            book.title;
          document.querySelector('.details__author').textContent =
            book.author.map(a => a.name).join(', ');
          document.querySelector('.details__summary').textContent =
            book.summary;
          document.querySelector(
            '.details__publisher'
          ).textContent = `First published in ${book.yearPublished} by ${book.publisher}`;
          document.querySelector(
            '.details__language'
          ).textContent = `Language: ${book.language}`;

          const statusSpan = document.querySelector(
            '.details__status span'
          );
          statusSpan.textContent = book.status;
          if (book.status.toLowerCase() !== 'available') {
            statusSpan.classList.remove('details__status--available');
            statusSpan.classList.add('details__status--borrowed');
          } else {
            statusSpan.classList.remove('details__status--borrowed');
            statusSpan.classList.add('details__status--available');
          }

          // Genres
          const tagsContainer =
            document.querySelector('.details__tags');
          tagsContainer.innerHTML = '';
          const tagColors = {
            romance: 'details__tag--1',
            fantasy: 'details__tag--1',
            drama: 'details__tag--1',
            satire: 'details__tag--1',

            horror: 'details__tag--2',
            gothic: 'details__tag--2',
            thriller: 'details__tag--2',
            tragedy: 'details__tag--2',
            dystopian: 'details__tag--2',

            history: 'details__tag--3',
            mystery: 'details__tag--3',
            adventure: 'details__tag--3',
            bildungsroman: 'details__tag--3',
            'science fiction': 'details__tag--3',
          };

          book.genre.forEach(g => {
            const p = document.createElement('p');
            p.className = `details__tag ${
              tagColors[g.toLowerCase()] || 'book__card-tag--0'
            }`;
            p.textContent = g;
            tagsContainer.appendChild(p);
          });

          document.querySelector(
            '.details__btn--edit'
          ).href = `/edit-book.html?id=${book._id}`;

          // Delete form
          const deleteForm = document.getElementById('deleteForm');
          deleteForm.action = `/api/v1/books/${book._id}`;

          // Edit Button
          const editBtn = document.querySelector(
            '.details__btn--edit'
          );
          editBtn.href = `/edit-book/${book._id}`;

          // Loans table
          const loanTableBody = document.querySelector(
            '.details__loan-table tbody'
          );
          loanTableBody.innerHTML = '';
          if (book.loanDates && book.loanDates.length > 0) {
            const loanTableBody = document.querySelector(
              '.details__loan-table tbody'
            );
            loanTableBody.innerHTML = '';

            book.loanDates.forEach((loanDateStr, index) => {
              const borrowedDateObj = new Date(loanDateStr);
              const returnDateObj = new Date(borrowedDateObj);
              returnDateObj.setDate(returnDateObj.getDate() + 14);

              const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
              };
              const borrowedDate = borrowedDateObj.toLocaleDateString(
                'en-US',
                options
              );
              const returnDate = returnDateObj.toLocaleDateString(
                'en-US',
                options
              );

              const tr = document.createElement('tr');
              tr.innerHTML = `
      <td>${index + 1}</td>
      <td>${borrowedDate}</td>
      <td>${returnDate}</td>
    `;
              loanTableBody.appendChild(tr);
            });
          } else {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="3">No loans recorded</td>`;
            loanTableBody.appendChild(tr);
          }
        } catch (err) {
          console.error(err);
          alert('Could not load book details.');
        }

        // Delete modal
        const deleteBtn = document.querySelector(
          '.details__btn--delete'
        );
        const modal = document.getElementById('deleteModal');
        const cancelBtn = document.getElementById('cancelDelete');

        deleteBtn.addEventListener('click', () => {
          modal.style.display = 'flex';
        });

        cancelBtn.addEventListener('click', () => {
          modal.style.display = 'none';
        });

        window.addEventListener('click', e => {
          if (e.target === modal) {
            modal.style.display = 'none';
          }
        });
      });

      const deleteForm = document.getElementById('deleteForm');

      deleteForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const url = deleteForm.action;

        const res = await fetch(url, {
          method: 'DELETE',
        });

        if (res.status === 204) {
          document.getElementById('deleteModal').style.display =
            'none';

          if (
            window.location.pathname === '/' ||
            window.location.pathname === '/home'
          ) {
            window.location.reload();
          }

          if (window.location.pathname.startsWith('/book/')) {
            window.location.href = '/';
          }
        }
      });
    </script>
  </body>
</html>

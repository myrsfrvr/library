<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" href="../img/favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="../style.css" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>New Author | Library</title>
  </head>
  <body>
    <div class="container">
      <nav class="nav nav--other">
        <a class="nav__link-logo" href="../index.html">
          <img
            class="nav__logo"
            src="../img/logo-black.png"
            alt="Logo of The Story Haven"
          />
        </a>

        <div class="nav__links">
          <a href="../index.html#books" class="nav__link">Books</a>
          <a href="../index.html#authors" class="nav__link"
            >Authors</a
          >
          <button class="nav__search-btn">
            <ion-icon name="search"></ion-icon>
          </button>
        </div>
      </nav>

      <section class="create">
        <div class="create__header">
          <h2 class="heading-secondary create__heading">
            Add a new author
          </h2>
        </div>
        <form
          action="/books"
          method="POST"
          enctype="multipart/form-data"
          class="create__form"
        >
          <!-- Name -->
          <div class="create__form--field">
            <label class="create__form--label" for="name">Name</label>
            <input
              class="create__form--input"
              type="text"
              name="name"
              required
            />
          </div>

          <!-- Birth Year -->
          <div class="create__form--field">
            <label class="create__form--label" for="birthYear"
              >Birth Year</label
            >
            <input
              class="create__form--input"
              type="number"
              name="birthYear"
              min="0"
              max="2025"
            />
          </div>

          <!-- Nationality (dropdown) -->
          <div class="create__form--field">
            <label class="create__form--label" for="nationality"
              >Nationality</label
            >
            <select class="create__form--dropdown" name="nationality">
              <option value="">Select nationality</option>
              <option>Albanian</option>
              <option>American</option>
              <option>Belgian</option>
              <option>British</option>
              <option>Chinese</option>
              <option>Czech</option>
              <option>Danish</option>
              <option>Dutch</option>
              <option>French</option>
              <option>German</option>
              <option>Italian</option>
              <option>Japanese</option>
              <option>Korean</option>
              <option>Mexican</option>
              <option>Portuguese</option>
              <option>Russian</option>
              <option>Spanish</option>
              <option>Ukrainian</option>
              <option>Vietnamese</option>
            </select>
          </div>

          <!-- Biography -->
          <div class="create__form--field">
            <label class="create__form--label" for="biography"
              >Biography</label
            >
            <input
              class="create__form--input"
              type="text"
              name="biography"
            />
          </div>

          <!-- Portrait Photo upload -->
          <div class="create__form--field">
            <label class="create__form--label" for="imageAuthor"
              >Portrait Photo</label
            >
            <input
              class="create__form--upload"
              type="file"
              name="imageAuthor"
              accept="image/*"
            />
          </div>

          <button class="create__form--btn" type="submit">
            Add Author
          </button>
        </form>
      </section>

      <footer class="footer">
        <div class="footer__links">
          <a href="../index.html#books" class="footer__link">Books</a>
          <a href="../index.html#authors" class="footer__link"
            >Authors</a
          >
          <a href="#" class="footer__link">Search</a>
        </div>
        <div class="footer__socials">
          <a href="https://www.instagram.com/">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
          <a href="https://x.com/">
            <ion-icon name="logo-twitter"></ion-icon>
          </a>
          <a href="https://www.linkedin.com/">
            <ion-icon name="logo-linkedin"></ion-icon>
          </a>
        </div>
        <p class="footer__copyright">
          &copy; 2025 The Story Haven Ltd.
        </p>
      </footer>
    </div>

    <!-- ICONS -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <link rel="icon" href="./img/favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="./style.css" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>Library</title>
  </head>
  <body>
    <div class="container">
      <nav class="nav">
        <a class="nav__link-logo" href="/">
          <img
            class="nav__logo"
            src="/img/logo-white.png"
            alt="Logo of The Story Haven"
          />
        </a>

        <!-- Navbar before scroll -->
        <div class="nav__links--default">
          <a href="#books" class="nav__btn">Browse Books</a>
        </div>

        <!-- Navbar after scroll -->
        <div class="nav__links--scrolled">
          <a href="#books" class="nav__link">Books</a>
          <a href="#authors" class="nav__link">Authors</a>
          <button class="nav__search-btn search-trigger">
            <ion-icon name="search"></ion-icon>
          </button>
        </div>

        <!-- Search Modal -->
        <div id="searchModal" class="modal">
          <div class="modal-content modal-search">
            <h2>Search Books</h2>

            <form class="search-form">
              <input
                type="text"
                name="query"
                placeholder="Search for a book..."
                class="search-input"
                required
              />

              <button type="submit" class="search-submit">
                <ion-icon name="search"></ion-icon>
              </button>
            </form>
          </div>
        </div>
      </nav>

      <header class="header">
        <div class="header__left-side">
          <span class="heading-primary--small">The</span>
          <h1 class="heading-primary">Story Haven</h1>
          <p class="header__slogan">
            Discover Worlds, One Book at a Time
          </p>
          <a href="#books" class="header__btn">Get started</a>
        </div>
        <div class="header__right-side"></div>
      </header>

      <section class="books" id="books">
        <div class="books__heading">
          <h2 class="heading-secondary">Books</h2>
          <a href="/add-book" class="books__link">New</a>
        </div>
        <div class="books__grid" id="booksGrid">
          <!-- JS HERE -->
        </div>
      </section>

      <section class="authors" id="authors">
        <div class="authors__heading">
          <h2 class="heading-secondary">Authors</h2>
          <!-- <a href="./html/newAuthor.html" class="authors__link"
            >New</a
          > -->
        </div>

        <div class="authors__carousel">
          <button class="authors__carousel-btn previous-btn faded">
            <ion-icon name="chevron-back-outline"></ion-icon>
          </button>

          <div class="authors__carousel-track" id="authorsCarousel">
            <!-- JS HERE -->
          </div>

          <button class="authors__carousel-btn next-btn">
            <ion-icon name="chevron-forward-outline"></ion-icon>
          </button>
        </div>
      </section>
      <div id="deleteModal" class="modal">
        <div class="modal__content">
          <h3>Are you sure you want to delete this book?</h3>

          <div class="modal__actions">
            <button
              id="cancelDelete"
              class="modal__btn modal__btn--cancel"
            >
              Cancel
            </button>

            <!-- action="/books/BOOK_ID_HERE?_method=DELETE"
            method="POST" -->
            <form id="deleteForm">
              <button
                type="submit"
                class="modal__btn modal__btn--delete"
              >
                Delete
              </button>
            </form>
          </div>
        </div>
      </div>

      <footer class="footer">
        <div class="footer__links">
          <a href="#books" class="footer__link">Books</a>
          <a href="#authors" class="footer__link">Authors</a>
          <button class="footer__link search-trigger">Search</button>
        </div>
        <div class="footer__socials">
          <a href="https://www.instagram.com/">
            <ion-icon name="logo-instagram"></ion-icon>
          </a>
          <a href="https://x.com/">
            <ion-icon name="logo-twitter"></ion-icon>
          </a>
          <a href="https://www.linkedin.com/">
            <ion-icon name="logo-linkedin"></ion-icon>
          </a>
        </div>
        <p class="footer__copyright">
          &copy; 2025 The Story Haven Ltd.
        </p>
      </footer>
    </div>

    <script src="./script.js"></script>

    <!-- ICONS -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
